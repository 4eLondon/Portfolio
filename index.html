<!doctype html>
<html>
    <head>
        <title>Home</title>
        <link rel="stylesheet" href="style.css">
        <script src="script.js"></script>
    </head>

    <body>
        <!--[ Presistents ]-->
        <div class="PRESISTENT">

            <!-- ( Cursor) -->
            <div class="cursor"></div>
            <div class="cursor-trailer"></div>

        <!-- ( Loader ) -->
        <div id="Loader">
            <img src="load_w.png" alt="Loading...">
        </div>

        <!-- ( Bars ) -->
        <div class="Bars">

        <!-- 0x0 Navigation 0x0 -->
        <nav id="navi">
            <ul>
                <li id="nav_home"> 
                    <button type="button"><img src="nav_h.png" alt="home"></button>
                </li>

                <li id="nav_about">
                    <button type="button"><img src="nav_a.png" alt="about"></button>
                </li>

                <li id="nav_projects">
                    <button type="button"><img src="nav_p.png" alt="projects"></button>
                </li>

                <li id="nav_misc">
                    <button button="button"><img src="nav_m.png" alt="misc"></button>
                </li>
            </ul>
        </nav>

        <!-- 0x0 Footer 0x0 -->
        <footer id="foot">

        <!--Muse-->
        <div id="Muse">

            <!--Music player progress bar-->
            <div id="progress_bar">
                <div id="progress_runner"></div>
            </div>

            <!--Music player controls-->
            <div id="audio_controls">
                <img src="repeat.png" alt="Repeat"> 
                <img src="previous.png" alt="Previous">
                <img src="playback.png" alt="Play/pause">
                <img src="next.png" alt="Next">
                <img src="shuffle.png" alt="Shuffle">
            </div>
        </div>

        </footer>
        <div/>

        </div>

        <!--[ Core Content ]-->
        <div class="CORE">

            <!-- ( Home section ) -->
            <div id="Home">

                <div id="h_lable"></div>
                <!--Home container text-->
                <div id="h_text">
                    <p></p>
                    <p></p>
                </div>

                <!--Home side panel-->
                <div id="h_side">
                    <div></div>
                </div>
            </div>

            <!-- ( About section ) -->
            <div id="About">

                <!--about tab-->
                <div id="a_lable"></div>
                    <div id="a_box">
                    </div>

            </div>

            <!-- ( Projects section ) -->
            <div id="Projects">

                <!--Project navigation/ Project tab-->
                <div id="p_lable"></div>

                    <div id"p_box">
                        <div id="a_projects"><a href=""></a></div>
                        <div id="c_projects"><a href=""></a></div>
                        <div id="w_projects"><a href=""></a></div>
                    </div>

                </div>

            <!-- ( Misc section ) -->
            <div id="Misc">

                <!--misc tab-->
                <div id="m_lable"></div>
                    <div id="m_box">
                    </div>

            </div>

        </div>
    </body>

            </html>
